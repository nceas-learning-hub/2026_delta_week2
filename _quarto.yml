project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"

filters:
- nceas-learning-hub/theme
- quarto-ext/fontawesome
exercises: ### for custom theme callouts
  number: false ### see https://cambiotraining.github.io/quarto-course-template/materials/02-content_guidelines.html but does not work
editor: source
execute:
  freeze: auto

format:
  theme-html:
    code-annotations: hover ### tool tip style footnotes for code

website:
  title: "2026 Delta Synthesis Working Groups week 2 (April 2026)"
  reader-mode: false
  repo-url: https://github.com/nceas-learning-hub/2026_delta_week2

  favicon: logo_lh_hex.png # learning hub logo on browser tab

  bread-crumbs: false
  navbar:
    right:
      - text: "Instructors"
        menu:
          - text: "Casey O'Hara"
            href: https://www.oharascience.com/
      - icon: github
        href: https://github.com/nceas-learning-hub/2026_delta_week2
        aria-label: GitHub

  sidebar:
    title: "Training Materials"
    style: "floating"
    search: true
    tools:
      - icon: house-door-fill
        href: https://www.nceas.ucsb.edu/learning-hub
      - icon: twitter
        href: https://twitter.com/ucsb_nceas
      - icon: github
        href: nceas-learning-hub.github.io/2026_delta_week2
    contents:
      - index.qmd # preface
      # START SESSIONS
      - section: "Day 1"
        contents:
        - s01_github_collaboration.qmd
        - s02_r_data_visualization.qmd
        - s03_blank_placeholder.qmd
      - section: "Day 2"
        contents:
        - s04_github_publishing.qmd
        - s05_r_geospatial_vector_analysis.qmd
      - section: "Day 3"
        contents:
        - s06_r_functions.qmd
        - s07_r_packages.qmd
      - section: "Day 4"
        contents:
        - s08_blank_placeholder.qmd
        - s09_blank_placeholder.qmd
      # END SESSIONS

  page-footer:
    center: "Copyright \u00a9 2026, NCEAS"
    ### NCEAS main website footer:
    # center: "\u00a9 The Regents of the University of California, All Rights Reserved"
    # could also include license info?
